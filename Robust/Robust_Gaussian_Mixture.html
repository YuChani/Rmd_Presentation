## Point Set as Gaussian Mixture Model
.nt-02.nb-01.f-90[
- **Point setмқ„ point listк°Җ м•„лӢҢ Gaussian Mixture densityлЎң н‘ңнҳ„**

- мқјл°ҳм Ғмқё GMM 
`$$p(\mathbf{x}) = \sum_{i=1}^k w_i \phi(\mathbf{x}|\mu_i, \Sigma_i)$$`
`$$\phi(\mathbf{x}|\mu_i, \Sigma_i) = \frac{\exp\left[-\frac{1}{2}(\mathbf{x} - \mu_i)^T \Sigma_i^{-1}(\mathbf{x} - \mu_i)\right]}{\sqrt{(2\pi)^d |\det(\Sigma_i)|}}$$`
  - `\(k\)` : componetмқҳ мҲҳ(м җ к°ңмҲҳ)
  - `\(\mu_i\)` : componentмқҳ mean (м җ мң„м№ҳ)
  - `\(\Sigma_i\)` : componentмқҳ covariance (м җ л¶„нҸ¬)
  - `\(w_i\)` : componentмқҳ weight (м җ мӨ‘мҡ”лҸ„) 
]
???
point cloudлҘј Gaussian Mixture densityлЎң н‘ңнҳ„.
к°Ғ м җм—җ Gaussianмқ„ м–№кі  spherical covarianceлҘј кіөмң н•ҳлҠ” лӢЁмҲңн•ң кө¬мЎ° мӮ¬мҡ©лҹү

---
## Registration as Density Alignment
.nt-02.nb-01[
  - Objective function
`$$d_{L_2}(S, \mathcal{M}, \theta) = \int (gmm(S) - gmm(T(\mathcal{M}, \theta)))^2 dx$$`
.f-90[
- `\(S\)`: fixed scene / target point set
- `\(\mathcal{M}\)`: moving model / source point set
- `\(\theta\)`: transformation parameters
- `\(T(\mathcal{M}, \theta)\)`: transformed model set
]

- Registrationмқ„ point residual minimizationмқҙ м•„лӢҲлқј density discrepancy minimizationмңјлЎң л°”кҫјлӢӨ
]
???
point-to-point residualмқ„ мөңмҶҢнҷ”к°Җ м•„лӢҳ. 
registrationлӢЁмң„лҘј point residualм—җм„ң density discrepancyлЎң н•Ё
---

## L2 Distance(Robust + Closed form)
.nt-02.nb-01.f-90[
- density power divergence
`$$d_\alpha(g, f) = \int \left\{ \frac{1}{\alpha}g^{1+\alpha} - \frac{1+\alpha}{\alpha}gf^\alpha + f^{1+\alpha} \right\} dx$$`
  - `\(\alpha\)` : 0мқҙл©ҙ KL divergence, 1мқҙл©ҙ L2 distance 
- Gaussian Product Integral
`$$\int \phi(\mathbf{x}|\mu_1, \Sigma_1)\phi(\mathbf{x}|\mu_2, \Sigma_2)\,dx = \phi(0|\mu_1 - \mu_2, \Sigma_1 + \Sigma_2)$$`

  - Gaussian mixture мӮ¬мқҙмқҳ L2 distanceк°Җ мӢӨм ңлЎң кі„мӮ° к°ҖлҠҘн•ң objective functionмқҙ лҗЁ
]
???
м•ҢнҢҢк°Җ 0мңјлЎң мҲҳл ҙн•ҳл©ҙ KL divergence, 1лЎң мҲҳл ҙн•ҳл©ҙ L2 distanceк°Җ лҗЁ
L2лҘј кі лҘё мқҙмң  2к°Җм§Җ. robustн•Ёмқҙкі ,
Gaussian product integralмқ„ мқҙмҡ©н•ҙ Gaussian mixture мӮ¬мқҙмқҳ L2 distanceк°Җ мӢӨм ңлЎң кі„мӮ° к°ҖлҠҘн•ң objective functionмқҙ лҗЁ

## Constraint / Limitation
.nt-02.nb-01.f-90[
### Constraints
- Density-based registrationмқҙлҜҖлЎң sampling densityк°Җ л№„мҠ·н•ң л‘җ point setм—җм„ң лҚ” мң лҰ¬н•Ё
- GMM constructionмқҖ equal weights, point-centered means, shared spherical covarianceлҘј к°Җм •
- мһ…л ҘмқҖ mesh, label, descriptor м—Ҷмқҙ point coordinatesл§Ң мһҲлҠ” unstructured point setк°Җ м „м ң
]

.f-90.mt-02[
### Limitations
- L2 objectiveк°Җ robustн•ҳлҚ”лқјлҸ„ local minimaлҠ” м—¬м „нһҲ лӮЁмқҢ
- symmetry, repeated patterns, large motion, poor initializationм—җм„ңлҠ” optimizationмқҙ local minimumм—җ к°Үнһҗ мҲҳ мһҲмқҢ
- мӢӨм ң м„ұлҠҘмқҖ large-scale start, annealing, multiple starts, coarse-to-fine к°ҷмқҖ heuristicм—җ нҒ¬кІҢ мқҳмЎҙн•Ё
- лӘЁл“  registration л¬ём ңм—җм„ң н•ӯмғҒ мөңм„ мқҳ л°©лІ•мқҙлқјкі  ліҙкё°лҠ” м–ҙл ӨмӣҖ
]
---
